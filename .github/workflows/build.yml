name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - chart/**
      - .github/workflows/build.yml
  workflow_dispatch:
  schedule:
    # Weekly rebuild on Mondays 04:17 UTC so apt-installed tools and
    # the upstream base image (if you bump the digest) stay reasonably fresh.
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tags
        id: vars
        run: |
          TS="$(date -u +%Y%m%d%H%M%S)"
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"
          echo "tag=0.1.0-${TS}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Package and push Helm chart
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          sed -i "s/^version:.*/version: ${TAG}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" chart/Chart.yaml
          helm dependency build chart/
          helm package chart/
          helm push hermes-chart-*.tgz oci://${{ env.REGISTRY }}/geoberle
