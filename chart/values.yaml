image:
  repository: ghcr.io/geoberle/hermes
  # tag defaults to Chart.appVersion (set by CI to the git SHA)
  tag: ""
  pullPolicy: Always

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

persistence:
  size: 5Gi
  storageClass: local-path

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 9119

config:
  model:
    default: ""
    provider: lmstudio
    base_url: http://litellm:4000
  agent:
    max_turns: 90
    gateway_timeout: 1800
    restart_drain_timeout: 60
    tool_use_enforcement: auto
  terminal:
    backend: local
    cwd: .
    timeout: 180
  display:
    tool_progress: all
    interim_assistant_messages: true
  browser:
    inactivity_timeout: 120
    command_timeout: 30
    allow_private_urls: false
  compression:
    enabled: true
    threshold: 0.5
    target_ratio: 0.2
    protect_last_n: 20
  security:
    redact_secrets: true
    tirith_enabled: true
    tirith_fail_open: true

secrets:
  TELEGRAM_BOT_TOKEN: "CHANGE_ME"
  GATEWAY_ALLOWED_USERS: "CHANGE_ME"
  LM_API_KEY: "CHANGE_ME"

soul: |
  You are Hermes — a helpful agent.

# --- LiteLLM subchart ---
litellm:
  masterkey: CHANGE_ME

  proxy_config:
    model_list:
      - model_name: your-model-name
        litellm_params:
          model: provider/model-id
          api_key: os.environ/PROVIDER_API_KEY

    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
      database_url: os.environ/DATABASE_URL

  envVars:
    LITELLM_SALT_KEY: CHANGE_ME
    PROVIDER_API_KEY: CHANGE_ME

  db:
    deployStandalone: true

  postgresql:
    architecture: standalone
    image:
      tag: latest
    auth:
      username: litellm
      database: litellm
      password: litellm-db-pass
      postgres-password: litellm-db-pass

  resources:
    requests:
      memory: 256Mi
      cpu: 200m
